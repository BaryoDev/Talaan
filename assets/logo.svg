<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Talaan">
  <title>Talaan</title>
  <defs>
    <linearGradient id="talaan-bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1F6F5C"/>
      <stop offset="1" stop-color="#124A3D"/>
    </linearGradient>
  </defs>

  <!-- rounded tile -->
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#talaan-bg)"/>

  <!-- table / grid: a header row plus body rows, one cell marked as "parsed" -->
  <g transform="translate(26,28)">
    <!-- header row -->
    <rect x="0" y="0" width="76" height="18" rx="4" fill="#F2B441"/>
    <!-- body grid -->
    <g fill="#FFFFFF" fill-opacity="0.92">
      <rect x="0"  y="24" width="34" height="14" rx="3"/>
      <rect x="42" y="24" width="34" height="14" rx="3"/>
      <rect x="0"  y="44" width="34" height="14" rx="3"/>
      <rect x="42" y="44" width="34" height="14" rx="3"/>
      <rect x="0"  y="64" width="34" height="14" rx="3"/>
    </g>
    <!-- marked cell -->
    <rect x="42" y="64" width="34" height="14" rx="3" fill="#8FE3B0"/>
    <path d="M52 71 l4 4 l8 -8" stroke="#124A3D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
