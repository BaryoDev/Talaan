name: Publish to NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 0.1.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore & build
        run: |
          dotnet restore
          dotnet build src/Talaan/Talaan.csproj --configuration Release --no-restore /p:Version=${{ github.event.inputs.version }}

      - name: Pack
        run: dotnet pack src/Talaan/Talaan.csproj --configuration Release --no-build --output ./nupkgs /p:Version=${{ github.event.inputs.version }}

      - name: Check for NuGet API key
        run: |
          if [ -z "${{ secrets.NUGET_API_KEY }}" ]; then
            echo "::error::NUGET_API_KEY secret is not set (org or repo)."
            exit 1
          fi

      - name: Publish
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Tag release
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v${{ github.event.inputs.version }}" -m "Release v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"
